<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script src="script.js" defer></script>
<link src="stylesheet" href="style.css">
<style>
    body {
        display: flex;
        justify-content: space-between;
        max-width: 1200px;
        margin: 0 auto;
        margin-top: 4rem;
        align-items: center;
    }

    button img {
        max-width: 40px;
        /* color: rgb(195, 120, 28); */
    }

    button :left arrow {
        background-color: red;
        /* background-color: blue; */
    }
</style>

<body>
    <div class="basket-1">
        <h1><span>10</span>-Apple</h1>
        <p>Basket 1</p>
    </div>
    <button class="left arrow">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJsA_L05AT3x7_bPuqmNV0DreOb1oktitRPw&s"
            alt="left-arrow">
        <button class="right arrow">
            <img src="https://www.iconpacks.net/icons/2/free-arrow-right-icon-2817-thumb.png" title="right-arrow">
        </button>
    </button>
    <div class="basket-2">
        <h1><span>0</span>-apple</h1>
        <p>Basket 2</p>
    </div>
</body>

</html>
